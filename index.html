// ===== ROUTER =====
function navigate(path) {
  history.pushState(null, '', path);
  render();
  window.scrollTo(0, 0);
}

window.addEventListener('popstate', render);
window.addEventListener('DOMContentLoaded', render);

function render() {
  const path = window.location.pathname;
  const app = document.getElementById('app');
  
  if (path === '/' || path === '/index.html' || path === '') {
    app.innerHTML = renderHome();
  } else if (path.match(/^\/departement\/([^\/]+)\/?$/)) {
    const slug = path.match(/^\/departement\/([^\/]+)\/?$/)[1];
    app.innerHTML = renderDept(slug);
  } else if (path.match(/^\/ville\/([^\/]+)\/?$/)) {
    const slug = path.match(/^\/ville\/([^\/]+)\/?$/)[1];
    app.innerHTML = renderVille(slug);
  } else {
    app.innerHTML = renderHome();
  }
  
  // Attach click handlers
  document.querySelectorAll('[data-link]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      navigate(el.getAttribute('data-link'));
    });
  });
  
  // Form submit
  const form = document.getElementById('devis-form');
  if (form) {
