  </div>
  <div class="faq-item" onclick="this.classList.toggle('open')">
    <div class="faq-q">Faut-il être propriétaire pour installer des panneaux solaires ?<span class="faq-arr">▾</span></div>
    <div class="faq-a">Oui, il faut en principe être propriétaire du logement ou obtenir l'accord du propriétaire. Pour les copropriétés, une autorisation de l'assemblée générale est requise pour toute installation sur les parties communes (toiture). En revanche, des panneaux solaires sur un balcon ou en autoconsommation collective sont possibles sans accord préalable.</div>
  </div>
  <div class="faq-item" onclick="this.classList.toggle('open')">
    <div class="faq-q">Quelle puissance choisir pour ma maison ?<span class="faq-arr">▾</span></div>
    <div class="faq-a">Pour un foyer de 2 à 3 personnes consommant 3 500 à 5 000 kWh/an, une installation de <strong>3 kWc</strong> suffit. Pour 4 à 5 personnes (5 000 à 8 000 kWh/an), optez pour <strong>6 kWc</strong>. Au-delà, notamment si vous avez une voiture électrique ou un spa, <strong>9 kWc et plus</strong> sera pertinent. Votre installateur réalisera une étude gratuite de dimensionnement.</div>
  </div>
  <div class="faq-item" onclick="this.classList.toggle('open')">
    <div class="faq-q">Quelles sont les aides disponibles en 2026 pour les panneaux solaires ?<span class="faq-arr">▾</span></div>
    <div class="faq-a">En 2026, vous pouvez cumuler plusieurs aides : <strong>TVA réduite à 10%</strong> sur la pose et les équipements, <strong>la prime à l'autoconsommation</strong> versée sur 5 ans (entre 160 et 570 €/kWc selon la puissance), et selon vos revenus <strong>MaPrimeRénov'</strong> jusqu'à 4 000 €. Le <strong>contrat d'obligation d'achat EDF OA</strong> vous garantit de revendre le surplus à tarif fixé pendant 20 ans. Toutes ces aides nécessitent un installateur certifié RGE.</div>
  </div>
  <div class="faq-item" onclick="this.classList.toggle('open')">
    <div class="faq-q">Quelle est la durée de vie des panneaux solaires ?<span class="faq-arr">▾</span></div>
    <div class="faq-a">Les panneaux photovoltaïques modernes ont une durée de vie de <strong>25 à 35 ans</strong>. Les fabricants garantissent généralement 80% de la puissance initiale après 25 ans. L'onduleur, lui, doit être remplacé au bout de 10 à 15 ans (coût : 1 000 à 2 000 €). Dans l'ensemble, une installation bien entretenue reste rentable pendant toute sa durée de vie.</div>
  </div>
  <div class="faq-item" onclick="this.classList.toggle('open')">
    <div class="faq-q">Faut-il un permis de construire pour installer des panneaux solaires ?<span class="faq-arr">▾</span></div>
    <div class="faq-a">Dans la plupart des cas, une simple <strong>déclaration préalable de travaux</strong> en mairie suffit. Un permis de construire n'est nécessaire que si l'installation modifie significativement l'aspect extérieur du bâtiment ou dépasse certains seuils de puissance. Dans les zones protégées (secteur ABF, monument historique), une autorisation spéciale peut être exigée. Votre installateur RGE s'occupe de toutes ces démarches.</div>
  </div>
  <div class="faq-item" onclick="this.classList.toggle('open')">
    <div class="faq-q">Est-ce que les panneaux solaires fonctionnent les jours nuageux ?<span class="faq-arr">▾</span></div>
    <div class="faq-a">Oui ! Les panneaux photovoltaïques fonctionnent avec la <strong>lumière diffuse</strong>, pas uniquement avec le soleil direct. Par temps couvert, la production est réduite (20 à 50% par rapport à une journée ensoleillée) mais reste réelle. En hiver, malgré des journées plus courtes, les panneaux fonctionnent — et certaines journées froides et ensoleillées de mars ou octobre sont parmi les plus productives de l'année.</div>
  </div>
  <div class="faq-item" onclick="this.classList.toggle('open')">
    <div class="faq-q">Quel est le délai entre le devis et l'installation ?<span class="faq-arr">▾</span></div>
    <div class="faq-a">En moyenne, comptez <strong>4 à 8 semaines</strong> entre la signature du devis et la mise en service. Ce délai comprend : la déclaration préalable en mairie (3 à 4 semaines), la commande du matériel, la pose (1 à 3 jours) et le raccordement par Enedis (1 à 3 semaines supplémentaires). Grâce à notre réseau, nous vous mettons en relation avec les installateurs les plus réactifs de votre secteur.</div>

function pgDept(slug){
  const dep=DEP_MAP[slug];
  if(!dep)return pgHome();
  document.title=`Installateur Panneau Solaire ${dep.nom} (${dep.code}) | devis-panneauxsolaires.fr`;
  const villesCards=dep.villes.map(v=>`<div class="card-link" onclick="nav('/ville/${v.slug}/')"><span class="card-ico">☀️</span>${v.nom}${v.pop>0?`<span class="card-badge">${(v.pop/1000).toFixed(0)}k</span>`:''}</div>`).join('');
  const voisinsCards=dep.voisins.map(d=>`<div class="card-link" onclick="nav('/departement/${d.slug}/')"><span class="card-ico">🗺️</span>${d.nom}<span class="card-badge">${d.code}</span></div>`).join('');
  const t20Cards=TOP20.map(v=>`<div class="card-link" onclick="nav('/ville/${v.slug}/')"><span class="card-ico">☀️</span>${v.nom}<span class="card-badge">${v.dep_code}</span></div>`).join('');
  const crumb=`<a onclick="nav('/')">Accueil</a><span class="bread-sep">›</span><a onclick="nav('/departement/${slug}/')">${dep.nom} (${dep.code})</a><span class="bread-sep">›</span><span>Installateur panneau solaire</span>`;
  return hdr(crumb)+`
<section class="dept-hero"><div class="dh-in">
  <div>
    <h1>Installateur Panneau Solaire<br><span>${dep.nom}</span> (${dep.code})</h1>
    <h2>Obtenez jusqu'à 3 devis gratuits d'artisans RGE certifiés dans le ${dep.nom}. Réponse garantie sous 24h.</h2>
    <div class="dept-tags"><span class="dtag">🏅 RGE QualiPV</span><span class="dtag">⚡ Réponse 24h</span><span class="dtag">🤝 Sans engagement</span><span class="dtag">📍 ${dep.villes.length} communes</span></div>
  </div>
  ${renderForm('',dep.code,`Département ${dep.nom}`)}
</div></section>
`+tbar()+`
<div class="cards-sec"><div class="cards-hd"><h2>Top ${dep.villes.length} Villes du ${dep.nom}</h2><p>Retrouvez un installateur certifié RGE dans chaque ville du département ${dep.nom}.</p></div><div class="cards-grid">${villesCards}</div></div>
<div style="background:var(--blue-light);padding:56px 20px">
  <div class="sec-grid" style="max-width:1200px;margin:0 auto">
    <div class="sec-txt">
      <h2>Pourquoi Choisir un Installateur Solaire dans le ${dep.nom} ?</h2>
      <p>Le département du ${dep.nom} bénéficie d'un ensoleillement favorable à la production photovoltaïque. Nos artisans partenaires sont tous <strong>certifiés RGE QualiPV</strong> et maîtrisent les spécificités locales : réglementation urbanistique, orientation des toitures, raccordement ENEDIS.</p>
      <h3>Aides disponibles dans le ${dep.nom} en 2026</h3>
      <p>En plus des aides nationales (MaPrimeRénov', TVA 10%, prime autoconsommation), certaines collectivités du ${dep.nom} proposent des subventions locales complémentaires. Nos installateurs vous guident pour maximiser vos économies.</p>
      <h3>Coût d'une installation dans le ${dep.nom}</h3>
      <p>Le prix varie de <strong>8 000 € à 20 000 €</strong> selon la puissance. Après déduction des aides, le reste à charge peut descendre à moins de 5 000 € pour un foyer standard.</p>
    </div>
    <div class="sec-img">🌞⚡</div>
  </div>
</div>
${dep.voisins.length?`<div class="cards-sec"><div class="cards-hd"><h2>Départements Limitrophes du ${dep.nom}</h2><p>Installez des panneaux solaires dans les départements voisins.</p></div><div class="cards-grid">${voisinsCards}</div></div>`:''}
<div class="cards-sec"><div class="cards-hd"><h2>Top 20 Villes de France – Panneau Solaire</h2><p>Nos installateurs couvrent l'intégralité du territoire national.</p></div><div class="cards-grid">${t20Cards}</div></div>
<div class="cta-band"><h2>Trouvez Votre Installateur dans le ${dep.nom}</h2><p>Comparez gratuitement les artisans RGE de votre département.</p><button class="btn-cta-w" onclick="window.scrollTo({top:0,behavior:'smooth'})">⚡ Devis Gratuit 24h</button></div>
`+mailSec(
  {t:`🏙️ Villes du ${dep.nom}`,i:dep.villes.slice(0,10).map(v=>({n:v.nom,h:`/ville/${v.slug}/`}))},
  {t:'🌍 Top Villes France',i:TOP20.slice(0,10).map(v=>({n:v.nom,h:`/ville/${v.slug}/`}))},
  {t:'🗺️ Départements Voisins',i:dep.voisins.map(d=>({n:`${d.nom} (${d.code})`,h:`/departement/${d.slug}/`}))}
)+foot();}

// ===== PAGE VILLE =====
function pgVille(slug){
  const vd=VILLE_MAP[slug];
  if(!vd)return pgHome();
  document.title=`Installateur Panneau Solaire ${vd.nom} | devis-panneauxsolaires.fr`;
  const dep=DEP_MAP[vd.dep_slug];
  const proches=vd.proches||[];
  const villesDept=dep?dep.villes.filter(v=>v.slug!==slug):[]; 
  const t20Grid=TOP20.map(v=>`<div class="card-link" onclick="nav('/ville/${v.slug}/')"><span class="card-ico">☀️</span>${v.nom}<span class="card-badge">${v.dep_code}</span></div>`).join('');
  const deptGrid=villesDept.slice(0,20).map(v=>`<div class="card-link" onclick="nav('/ville/${v.slug}/')"><span class="card-ico">📍</span>${v.nom}${v.pop>0?`<span class="card-badge">${(v.pop/1000).toFixed(0)}k</span>`:''}</div>`).join('');
  const crumb=`<a onclick="nav('/')">Accueil</a><span class="bread-sep">›</span>${dep?`<a onclick="nav('/departement/${dep.slug}/')">${dep.nom} (${dep.code})</a><span class="bread-sep">›</span>`:''}<span>Installateur panneau solaire ${vd.nom}</span>`;
  return hdr(crumb)+`
<section class="dept-hero"><div class="dh-in">
  <div>
    <h1>Installateur Panneau Solaire<br><span>${vd.nom}</span></h1>
    <h2>Comparez les meilleurs installateurs solaires certifiés RGE à ${vd.nom}. Devis gratuit, réponse en 24h, sans engagement.</h2>
    <div class="dept-tags"><span class="dtag">🏅 RGE QualiPV</span><span class="dtag">⚡ Réponse 24h</span><span class="dtag">🤝 Sans engagement</span>${dep?`<span class="dtag">📍 ${dep.nom} (${dep.code})</span>`:''}</div>
  </div>
  ${renderForm(vd.nom,'',`Ville ${vd.nom}`)}
</div></section>
`+tbar()+`
<div style="background:var(--blue-light);padding:56px 20px">
  <div class="sec-grid" style="max-width:1200px;margin:0 auto">
    <div class="sec-txt">
      <h2>Installateur Panneau Solaire à ${vd.nom} – Guide 2026</h2>
      <p>Vous cherchez un <strong>installateur de panneaux solaires à ${vd.nom}</strong> ? Notre réseau regroupe les meilleurs artisans RGE QualiPV${dep?` de ${dep.nom}`:''}. Chaque installateur est sélectionné pour son expertise, la qualité de ses équipements et sa réactivité.</p>
      <h3>Le solaire photovoltaïque à ${vd.nom}</h3>
      <p>${dep?`Située dans le département ${dep.nom}, la commune de`:''} ${vd.nom} présente un potentiel solaire intéressant. Une installation de <strong>6 kWc</strong> peut produire entre 6 000 et 8 500 kWh par an, couvrant une grande partie des besoins d'un foyer moyen.</p>
      <h3>Prix d'une installation solaire à ${vd.nom}</h3>
      <p>Coût entre <strong>8 000 € et 18 000 €</strong> selon la puissance. Après aides (TVA 10%, prime autoconsommation, MaPrimeRénov'), retour sur investissement atteint en <strong>7 à 10 ans</strong>.</p>
    </div>
    <div class="sec-img">🏠☀️</div>
  </div>
</div>
<div class="cards-sec"><div class="cards-hd"><h2>Top 20 Villes de France – Panneau Solaire</h2><p>Nos installateurs RGE interviennent dans toutes les grandes villes françaises.</p></div><div class="cards-grid">${t20Grid}</div></div>
${dep?`<div class="cards-sec"><div class="cards-hd"><h2>Top Villes du ${dep.nom} – <a onclick="nav('/departement/${dep.slug}/')" style="color:var(--blue);cursor:pointer;font-size:.85em">← Voir le département</a></h2><p>Retrouvez des installateurs certifiés dans toutes les communes du ${dep.nom}.</p></div><div class="cards-grid">${deptGrid}</div></div>`:''}
<div class="cta-band"><h2>Comparez 3 Devis Gratuits à ${vd.nom}</h2><p>Des artisans RGE de ${vd.nom} et ses alentours prêts à intervenir rapidement.</p><button class="btn-cta-w" onclick="window.scrollTo({top:0,behavior:'smooth'})">⚡ Obtenir Mon Devis Gratuit</button></div>
`+mailSec(
  {t:'🌍 Top 20 Villes France',i:TOP20.slice(0,10).map(v=>({n:`Installateur ${v.nom}`,h:`/ville/${v.slug}/`}))},
  {t:`🏙️ ${dep?`Villes du ${dep.nom}`:'Villes du département'}`,i:villesDept.slice(0,10).map(v=>({n:v.nom,h:`/ville/${v.slug}/`}))},
  {t:`📍 10 Villes proches de ${vd.nom}`,i:proches.length?proches.map(p=>({n:`${p.nom}${p.distance?` (${p.distance}km)`:''}`,h:`/ville/${p.slug}/`})):villesDept.slice(10,20).map(v=>({n:v.nom,h:`/ville/${v.slug}/`}))}
)+foot();}
</script>
</body>
</html>
